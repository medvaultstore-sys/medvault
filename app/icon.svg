<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Black rounded square background -->
  <rect width="100" height="100" rx="18" fill="#000000"/>

  <!-- M — left outer ribbon -->
  <polygon points="8,74 13,19 22,19 17,74" fill="#1DBF73"/>
  <!-- M — left fold (darker face) -->
  <polygon points="13,19 22,19 17,74 15,74" fill="#0EA556"/>
  <!-- M — left-center diagonal ribbon -->
  <polygon points="22,19 35,19 27,74 17,74" fill="#1DBF73"/>
  <!-- M — right-center diagonal ribbon -->
  <polygon points="35,19 40,19 32,74 24,74" fill="#1DBF73"/>

  <!-- V — left diagonal ribbon -->
  <polygon points="40,19 51,19 57,74 46,74" fill="#1DBF73"/>
  <!-- V — right diagonal ribbon -->
  <polygon points="51,19 62,19 68,74 57,74" fill="#1DBF73"/>
  <!-- V — right fold (darker face) -->
  <polygon points="62,19 65,19 71,74 68,74" fill="#0EA556"/>

  <!-- + superscript -->
  <rect x="66" y="16" width="5" height="15" rx="1.5" fill="#1DBF73"/>
  <rect x="62" y="21" width="13" height="5" rx="1.5" fill="#1DBF73"/>
</svg>
